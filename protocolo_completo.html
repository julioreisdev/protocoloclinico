const CATS=["Todos",...[...new Set(PROTO.map(x=>x.cat))]];
let activeCat="Todos",onlyAB=false,q="",openKey=null;

function renderCats(){
  document.getElementById("cats").innerHTML=CATS.map(c=>`<button class="cb${activeCat===c?" on":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function esc(s){return String(s).replace(/[&<>"']/g,m=>({
  "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
}[m]));}

function makeExamPills(key,filterAB){
  const exs=EXAMS[key]||[];
  const vis=filterAB?exs.filter(e=>e.ab):exs;
  return vis.map(e=>`<span class="pill ${e.ab?"pab":"pref"}"><span class="dot ${e.ab?"dab":"dref"}"></span>${esc(e.n)}</span>`).join("");
}

function makeCard(item){
  const exs=EXAMS[item.key]||[];
  const abN=exs.filter(e=>e.ab).length;
  const refN=exs.filter(e=>!e.ab).length;
  const isOpen=openKey===item.key;
  const ql=q.toLowerCase();
  const filterAB=onlyAB;
  const pills=makeExamPills(item.key,filterAB);
  
  const proto=esc(item.text);
  
  const tabsHtml=`
    <div class="tabs">
      <span class="tab on" onclick="switchTab(this,'proto-${item.key}')">Protocolo</span>
      <span class="tab" onclick="switchTab(this,'exams-${item.key}')">Exames</span>
    </div>
    <div class="tab-content on" id="proto-${item.key}">
      <pre class="proto-text">${proto}</pre>
    </div>
    <div class="tab-content" id="exams-${item.key}">
      <div class="exams-grid">${makeExamPills(item.key,false)}</div>
    </div>
    <div class="close-btn" onclick="closeCard()">▲ Fechar</div>`;
  
  return`<div class="card${isOpen?" open":""}" id="card-${item.key}" onclick="!this.classList.contains('open')&&openCard('${item.key}')">
    <div class="card-top">
      <div class="card-head"><span class="c-title">${esc(item.title)}</span><span class="c-cid">${esc(item.cid)}</span></div>
      <div class="c-cat">${esc(item.cat)}</div>
      <div class="c-exams">${pills||'<span style="font-size:11px;color:var(--text3)">–</span>'}</div>
      <div class="c-count">AB: ${abN} · Referência: ${refN}</div>
      ${!isOpen?'<div class="expand-hint">↓ Ver protocolo completo</div>':''}
    </div>
    <div class="card-body">${isOpen?tabsHtml:''}</div>
  </div>`;
}

function switchTab(el,targetId){
  const card=el.closest('.card-body');
  card.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  card.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById(targetId).classList.add('on');
}

window.openCard=function(key){
  openKey=key;
  render();
  setTimeout(()=>{
    const el=document.getElementById('card-'+key);
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  },50);
};

window.closeCard=function(){
  openKey=null;
  render();
};

window.setCat=function(c){activeCat=c;openKey=null;renderCats();render();};

function render(){
  const ql=q.toLowerCase();
  const filtered=PROTO.filter(item=>{
    if(activeCat!=="Todos"&&item.cat!==activeCat)return false;
    if(ql){
      const mD=item.title.toLowerCase().includes(ql)||item.cid.toLowerCase().includes(ql)||item.text.toLowerCase().includes(ql);
      const exs=EXAMS[item.key]||[];
      const mE=exs.some(e=>e.n.toLowerCase().includes(ql));
      if(!mD&&!mE)return false;
    }
    return true;
  });
  const totalAB=filtered.reduce((s,i)=>{const e=EXAMS[i.key]||[];return s+e.filter(x=>x.ab).length;},0);
  const totalRef=filtered.reduce((s,i)=>{const e=EXAMS[i.key]||[];return s+e.filter(x=>!x.ab).length;},0);
  document.getElementById("stats").innerHTML=`<strong>${filtered.length}</strong> ${filtered.length===1?"protocolo":"protocolos"} · <strong>${totalAB}</strong> exames AB · <strong>${totalRef}</strong> de referência`;
  if(!filtered.length){
    document.getElementById("grid").innerHTML='<div class="empty" style="grid-column:1/-1">Nenhum resultado encontrado.</div>';
    return;
  }
  document.getElementById("grid").innerHTML=filtered.map(makeCard).join("");
}

document.getElementById("q").addEventListener("input",e=>{q=e.target.value;openKey=null;render();});
